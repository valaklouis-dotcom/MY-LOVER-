<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💖 Love Page 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Quicksand', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1);
  background-size: 400% 400%;
  animation: gradientMove 10s ease infinite;
  text-align: center;
  color: white;
  overflow-x: hidden;
}

@keyframes gradientMove {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.page { display: none; padding: 20px; max-width: 600px; margin: auto; }
.active { display: block; }

h1 {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(28px,6vw,60px);
  text-shadow: 0 0 20px pink;
}

p { font-size: clamp(14px,3.5vw,20px); }

button {
  font-family: 'Pacifico', cursive;
  background: linear-gradient(45deg, #ff69b4, #ff85c1);
  border: none;
  color: white;
  padding: 12px 20px;
  border-radius: 25px;
  margin: 10px;
  cursor: pointer;
  font-size: 16px;
  box-shadow: 0 0 10px pink;
}

input {
  padding: 12px;
  border-radius: 12px;
  border: none;
  width: 90%;
  max-width: 400px;
}

.cat, .dog {
  width: 140px;
  margin: 10px;
  cursor: pointer;
  animation: float 3s ease-in-out infinite;
  filter: drop-shadow(0 0 10px pink);
}

@keyframes float {
  0%{transform:translateY(0);}
  50%{transform:translateY(-15px);}
  100%{transform:translateY(0);}
}

.cat:active, .dog:active {
  transform: scale(1.2) rotate(5deg);
}
</style>
</head>

<body>

<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-love.mp3">
</audio>

<!-- PAGE 1 -->
<div class="page active" id="p1">
  <h1>💖 Chào người em yêu ạ! 💖</h1>
  <p>Nhấn vào đây để tâm sự nhá Bae iu ơi!</p>

  <img class="cat" onclick="catTalk('Em nhớ anh 💖')" src="https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif">
  <img class="dog" onclick="dogTalk('Anh bấm nhanh lên 😤')" src="https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif">

  <br>
  <button onclick="next('p2')">💘 Bắt đầu 💘</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
  <h1>Anh có thương em không?</h1>
  <button onclick="next('p3')">Anh có 💖</button>
  <button onclick="next('p3')">Nào dám trả lời không 😏</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="p3">
  <img class="cat" src="https://media.giphy.com/media/mlvseq9yvZhba/giphy.gif">
  <img class="dog" src="https://media.giphy.com/media/l0HlQ7LRalQqdWfao/giphy.gif">
  <h1>Em cũng thương anh lắm 💖</h1>
  <button onclick="next('p4')">Tiếp ➡️</button>
</div>

<!-- PAGE 4 -->
<div class="page" id="p4">
  <h1>Dạo này anh thấy thế nào?</h1>
  <input id="q1">
  <br><button onclick="next('p5')">➡️</button>
</div>

<!-- PAGE 5 -->
<div class="page" id="p5">
  <h1>Anh thích ăn gì nhất?</h1>
  <input id="q2">
  <br><button onclick="next('p6')">➡️</button>
</div>

<!-- PAGE 6 -->
<div class="page" id="p6">
  <h1>Anh đang muốn làm gì?</h1>
  <input id="q3">
  <br><button onclick="next('p7')">➡️</button>
</div>

<!-- PAGE 7 -->
<div class="page" id="p7">
  <h1>Anh thích quà gì nhất?</h1>
  <input id="q4">
  <br><button onclick="next('p8')">➡️</button>
</div>

<!-- PAGE 8 -->
<div class="page" id="p8">
  <h1>Điều gì ở em làm anh phiền?</h1>
  <input id="q5">
  <br><button onclick="sendAllData(); next('p9')">💌 Gửi</button>
</div>

<!-- PAGE 9 -->
<div class="page" id="p9">
  <h1>💖 Em đã ghi nhận rồi 💖</h1>
  <p>I love you 💘</p>
</div>

<script>

// chuyển trang
function next(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// mèo nói
function catTalk(t){
  alert("🐱 "+t);
}

// chó nói
function dogTalk(t){
  alert("🐶 "+t);
}

// cupid + tim
function shootHeart(x,y){
  let h=document.createElement("div");
  h.innerHTML="💘";
  h.style.position="fixed";
  h.style.left=x+"px";
  h.style.top=y+"px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),2000);
}

document.addEventListener("click",e=>shootHeart(e.clientX,e.clientY));

function createCupid(){
  let c=document.createElement("img");
  c.src="https://cdn-icons-png.flaticon.com/512/833/833472.png";
  c.style.position="fixed";
  c.style.left="-50px";
  c.style.top=Math.random()*80+"vh";
  c.style.width="50px";
  document.body.appendChild(c);

  let move=setInterval(()=>{
    let l=parseFloat(c.style.left);
    c.style.left=(l+3)+"px";
    if(l>window.innerWidth){c.remove();clearInterval(move);}
  },30);
}
setInterval(createCupid,1000);

// gửi form
function sendAllData(){
  let d=new FormData();
  d.append("entry.137169317", q1.value);
  d.append("entry.454111835", q2.value);
  d.append("entry.1872124055", q3.value);
  d.append("entry.669638336", q4.value);
  d.append("entry.559059606", q5.value);

  fetch("https://docs.google.com/forms/d/e/1FAIpQLSdYuCVEM7QCvCqjvtUc6SuVrNW1flerqN3PaKQ4poPHXj2uIA/formResponse",{
    method:"POST",
    mode:"no-cors",
    body:d
  });
}

</script>

</body>
</html>
